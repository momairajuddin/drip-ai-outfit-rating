kind = "mobile"
previewPath = "/drip-mobile/"
title = "DRIP. Mobile"
version = "1.0.0"
id = "artifacts/drip-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/drip-mobile/" ]
localPort = 23621

[services.development]
run = "pnpm --filter @workspace/drip-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drip-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/drip-mobile", "run", "serve" ]

[services.env]
PORT = "23621"
BASE_PATH = "/drip-mobile/"
