kind = "web"
previewPath = "/"
title = "DRIP."
version = "1.0.0"
id = "artifacts/drip-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19883

[services.development]
run = "pnpm --filter @workspace/drip-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drip-app", "run", "build" ]
publicDir = "artifacts/drip-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19883"
BASE_PATH = "/"
